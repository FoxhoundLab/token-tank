  <head>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff9a1f'%3E%3Cpath fill-rule='evenodd' d='M4 2h11v19H4V2zm2 2.2h7v4.6H6V4.2z'/%3E%3Crect x='6' y='11' width='7' height='1.6'/%3E%3Crect x='6' y='14' width='7' height='1.6'/%3E%3Crect x='6' y='17' width='4.2' height='1.6'/%3E%3Cpath d='M16.2 6.8h1.6l3.2 3.4v7.2a2.55 2.55 0 0 1-5.1 0h1.7a.85.85 0 0 0 1.7 0v-4h-1.9v-2h1.9v-1.4l-1.7-1.8h-1.4v-1.4z'/%3E%3Crect x='2.6' y='22' width='13.8' height='1.5'/%3E%3C/svg%3E" />
    <title>⛽ Token Tank — AI Usage Monitor</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("token-tank-theme");
          var themes = ["tank", "midnight", "mono", "cyberpunk"];
          document.documentElement.setAttribute(
            "data-theme",
            themes.indexOf(t) >= 0 ? t : "tank"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "tank");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
